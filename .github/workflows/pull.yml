name: Relay Pull

on:
  workflow_dispatch:

concurrency:
  group: relay-pull
  cancel-in-progress: false

jobs:
  pull:
    runs-on: windows-latest
    timeout-minutes: 5

    steps:
      - name: Check Out Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Trigger Relay Pull
        env:
          RELAY_URL: ${{ secrets.RELAY_URL }}
          PULL_TOKEN: ${{ secrets.PULL_TOKEN }}
        shell: pwsh
        run: python .\cli\cli.py pull
